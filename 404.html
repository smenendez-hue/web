<!DOCTYPE html>
<html lang="es" data-theme="system">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Página no encontrada — YiQi</title>
  <meta name="description" content="La página que buscas no existe. Te ayudamos a volver al camino correcto.">
  <meta name="robots" content="noindex,follow">
  <link rel="stylesheet" href="./site.css">
  <script src="./components/site-header.js" defer></script>
  <script src="./components/site-footer.js" defer></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@700;800&family=Inter:wght@300;400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    /* ═══ TOKENS — DS v1.2.5 ═══ */
    :root {
      --bg:          #0c0c0e;
      --bg-elev:     #111114;
      --bg-elev-2:   #18181c;
      --bg-soft:     rgba(255,255,255,.04);
      --line:        rgba(255,255,255,.08);
      --line-strong: rgba(255,255,255,.14);
      --text:        #f0f1f3;
      --muted:       #8a8d94;
      --muted-2:     #5a5d66;
      --cyan:        #00ccff;
      --cyan-soft:   rgba(0,204,255,.12);
      --cyan-soft-2: rgba(0,204,255,.18);
      --cyan-label:  rgba(0,204,255,.52);
      --text-cyan-muted: rgba(0,195,240,.45);
      --green:       #00c48c;
      --amber:       #f6a623;
      --red:         #f25f5c;
      --glow:        0 0 0 3px rgba(0,204,255,.22);
      --shadow-sm:   0 1px 3px rgba(0,0,0,.35), 0 1px 8px rgba(0,0,0,.18);
      --shadow-md:   0 4px 16px rgba(0,0,0,.28);
      --shadow-lg:   0 8px 32px rgba(0,0,0,.36);
      --sans:        'Inter', ui-sans-serif, system-ui, sans-serif;
      --mono:        'IBM Plex Mono', ui-monospace, monospace;
      --display:     'Greycliff CF', 'Plus Jakarta Sans', ui-sans-serif, system-ui, sans-serif;
      --radius-xs:   5px;
      --radius-sm:   7px;
      --radius:      10px;
      --radius-md:   12px;
      --radius-lg:   16px;
      --radius-xl:   20px;
      --radius-pill: 999px;
      --tr:          180ms ease;
      --topbar-h:    56px;
    }
    html[data-theme="light"] {
      --bg:          #f5f4f0;
      --bg-elev:     #eeece7;
      --bg-elev-2:   #e6e4df;
      --bg-soft:     rgba(0,0,0,.04);
      --line:        rgba(0,0,0,.08);
      --line-strong: rgba(0,0,0,.13);
      --text:        #17191c;
      --muted:       #586170;
      --muted-2:     #7f8896;
      --text-cyan-muted: rgba(0,140,175,.48);
      --cyan:        #009fc7;
      --cyan-soft:   rgba(0,159,199,.12);
      --cyan-soft-2: rgba(0,159,199,.18);
      --cyan-label:  rgba(0,159,199,.52);
      --green:       #0c9b6d;
      --amber:       #c78000;
      --red:         #d4485e;
      --glow:        0 0 0 3px rgba(0,159,199,.22);
      --shadow-sm:   0 2px 8px rgba(16,36,54,.08);
      --shadow-md:   0 8px 24px rgba(16,36,54,.12);
      --shadow-lg:   0 16px 32px rgba(16,36,54,.16);
    }

    *, *::before, *::after { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; overflow-x: clip; }
    body {
      font: 16px/1.5 var(--sans);
      color: var(--text);
      min-height: 100vh;
      background:
        radial-gradient(circle at 72% 8%,  rgba(0,204,255,.07), transparent 28%),
        radial-gradient(circle at 12% 60%, rgba(0,204,255,.04), transparent 22%),
        linear-gradient(rgba(255,255,255,.018) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,.018) 1px, transparent 1px),
        var(--bg);
      background-size: auto, auto, 52px 52px, 52px 52px, auto;
    }
    html[data-theme="light"] body {
      background:
        radial-gradient(circle at 72% 8%,  rgba(0,159,199,.06), transparent 28%),
        radial-gradient(circle at 12% 60%, rgba(0,159,199,.04), transparent 22%),
        linear-gradient(rgba(0,0,0,.032) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,0,0,.032) 1px, transparent 1px),
        var(--bg);
      background-size: auto, auto, 52px 52px, 52px 52px, auto;
    }

    /* ═══ LAYOUT ═══ */
    .nf-wrap {
      max-width: 720px;
      margin: 0 auto;
      padding: 96px 24px 64px;
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
    }
    @media (max-width: 720px) {
      .nf-wrap { padding: 56px 20px 48px; }
    }

    /* Número 404 grande tipo display */
    .nf-code {
      font: 800 clamp(120px, 22vw, 200px)/.9 var(--display);
      letter-spacing: -.04em;
      color: var(--text);
      margin: 0;
      display: inline-flex;
    }
    .nf-code .digit {
      display: inline-block;
      min-width: .55em; /* evita que el ancho cambie durante el scramble */
      text-align: center;
    }
    .nf-code .zero { color: var(--cyan); }
    .nf-code .digit.scrambling {
      color: var(--muted-2);
      transition: color .12s ease;
    }
    .nf-code .zero.scrambling { color: var(--text-cyan-muted); }

    .nf-eyebrow {
      display: inline-flex; align-items: center; gap: 8px;
      padding: 5px 12px;
      background: var(--amber-soft, rgba(246,166,35,.12));
      color: var(--amber);
      font: 600 11px var(--mono); letter-spacing: .04em;
      border-radius: var(--radius-pill);
      margin: 24px 0 16px;
      text-transform: uppercase;
    }

    .nf-title {
      font: 800 40px/1.15 var(--display);
      letter-spacing: -.02em;
      color: var(--text);
      margin: 0 0 16px;
      max-width: 560px;
    }
    @media (max-width: 720px) { .nf-title { font-size: 28px; } }

    .nf-lead {
      font: 400 17px/1.6 var(--sans);
      color: var(--muted);
      max-width: 500px;
      margin: 0 0 36px;
    }
    @media (max-width: 720px) { .nf-lead { font-size: 15px; } }

    /* CTAs */
    .nf-ctas {
      display: flex; gap: 12px; flex-wrap: wrap; justify-content: center;
    }
    .nf-btn {
      display: inline-flex; align-items: center; gap: 8px;
      padding: 12px 20px;
      font: 600 14px var(--sans);
      border-radius: var(--radius-md);
      border: 1px solid transparent;
      cursor: pointer;
      text-decoration: none;
      transition: all var(--tr);
    }
    .nf-btn-primary {
      background: var(--cyan-soft-2);
      color: var(--cyan);
    }
    .nf-btn-primary:hover { background: var(--cyan-soft); box-shadow: var(--shadow-sm); }
    .nf-btn-ghost {
      background: transparent; color: var(--muted);
    }
    .nf-btn-ghost:hover { background: var(--bg-soft); color: var(--text); }

    /* URL mostrada */
    .nf-url {
      font: 500 12px var(--mono);
      color: var(--muted-2);
      padding: 6px 12px;
      background: var(--bg-soft);
      border-radius: var(--radius-sm);
      margin-bottom: 24px;
      max-width: 100%;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      display: inline-block;
    }
  </style>
</head>
<body>

<site-header base="./" current-page=""></site-header>

<main>
  <div class="nf-wrap">
    <h1 class="nf-code" aria-label="Error 404">
      <span class="digit"      data-final="4">4</span>
      <span class="digit zero" data-final="0">0</span>
      <span class="digit"      data-final="4">4</span>
    </h1>

    <div class="nf-eyebrow">Página no encontrada</div>

    <h2 class="nf-title">Esta página no existe… o ya no.</h2>
    <p class="nf-lead">
      El enlace puede estar mal escrito, el contenido pudo haber cambiado de dirección,
      o simplemente no llegamos a crearla todavía.
    </p>

    <div class="nf-url" id="current-url" aria-label="URL que intentabas visitar"></div>

    <div class="nf-ctas">
      <a class="nf-btn nf-btn-primary" href="./index.html">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12l9-9 9 9M5 10v10a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2V10"/></svg>
        Ir al inicio
      </a>
      <a class="nf-btn nf-btn-ghost" href="./contacto.html">
        Contactar a YiQi
      </a>
    </div>

  </div>
</main>

<site-footer base="./"></site-footer>

<script>
  /* Tema */
  (function() {
    const _mq = window.matchMedia('(prefers-color-scheme: dark)');
    const resolveTheme = v => v === 'system' ? (_mq.matches ? 'dark' : 'light') : v;
    document.documentElement.dataset.theme = resolveTheme(localStorage.getItem('yiqi-theme') || 'system');
    _mq.addEventListener('change', () => {
      if ((localStorage.getItem('yiqi-theme') || 'system') === 'system') {
        document.documentElement.dataset.theme = _mq.matches ? 'dark' : 'light';
      }
    });
  })();

  /* Mostrar la URL que intentaron visitar — útil para que el usuario entienda qué pasó */
  (function() {
    const el = document.getElementById('current-url');
    if (!el) return;
    const url = location.pathname + location.search;
    if (url && url !== '/' && url !== '/404.html') {
      el.textContent = url;
    } else {
      el.style.display = 'none';
    }
  })();

  /* Scramble loop del número 404
     Cada ~6 seg, los dígitos se desordenan rápido y se rearman.
     Respeta prefers-reduced-motion. */
  (function() {
    const reduceMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
    if (reduceMotion) return;

    const digits = document.querySelectorAll('.nf-code .digit');
    if (!digits.length) return;

    const CHARS = '0123456789!@#$%?<>';
    const LOOP_MS = 6000;       // cada cuánto se rearma
    const TICK_MS = 45;         // velocidad del scramble
    const STAGGER_TICKS = 6;    // diferencia de timing entre dígitos

    function randomChar() {
      return CHARS[Math.floor(Math.random() * CHARS.length)];
    }

    function runScramble() {
      digits.forEach((digit, idx) => {
        const finalChar = digit.dataset.final;
        const maxIter = 14 + idx * STAGGER_TICKS;
        let iter = 0;
        digit.classList.add('scrambling');
        const interval = setInterval(() => {
          if (iter >= maxIter) {
            digit.textContent = finalChar;
            digit.classList.remove('scrambling');
            clearInterval(interval);
            return;
          }
          digit.textContent = randomChar();
          iter++;
        }, TICK_MS);
      });
    }

    // Primer scramble al cargar (después de un beat para que se vea el 404 inicial)
    setTimeout(runScramble, 1200);
    // Loop continuo
    setInterval(runScramble, LOOP_MS);
  })();
</script>
</body>
</html>
