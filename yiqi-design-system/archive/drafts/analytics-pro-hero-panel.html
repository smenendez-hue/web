  .browser-dot.yellow { background: #febc2e; }

  .browser-dot.green  { background: #28c840; }

  .browser-bar i { font-size: 11px; color: var(--muted-2); }

  .browser-body {
    aspect-ratio: 16/9;
    position: relative; overflow: hidden;
    background: #0d1117;
  }

  .browser-body { aspect-ratio: 4/3; }

  .browser-body::before {
    content: '';
    position: absolute; inset: 0;
    background: #0d1117;
    z-index: 0;
  }

  .panel-iframe {
    display: block; width: 100%; height: 100%;
    border: none; pointer-events: none;

  }

    .browser-body > div { padding: 12px !important; gap: 8px !important; }

    .browser-body > div > div:first-child { grid-template-columns: repeat(2,1fr) !important; }

    .browser-body > div > div:last-child  { grid-template-columns: 1fr !important; }

    const f = document.querySelector('.panel-iframe');
    if (f && f.contentWindow) f.contentWindow.postMessage({ yiqiTheme: resolved }, '*');
  }
  function setTheme(v) {
    localStorage.setItem('yiqi-theme', v);
    applyTheme(v); updateSwitch(v);
    syncIframe(resolveTheme(v));
  }
  (function () {
    const s = localStorage.getItem('yiqi-theme') || 'system'; // default: sistema del usuario
    applyTheme(s);
    document.addEventListener('DOMContentLoaded', () => {
      updateSwitch(s);
      const f = document.querySelector('.panel-iframe');
      if (f) f.addEventListener('load', () => syncIframe(resolveTheme(s)));
    });
  })();
  mq.addEventListener('change', () => {
    const c = localStorage.getItem('yiqi-theme') || 'system';
    if (c === 'system') { applyTheme('system'); syncIframe(resolveTheme('system')); }
  });
