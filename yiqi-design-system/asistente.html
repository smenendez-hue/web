<title>YiQi · Asistente iA Ready</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Inter:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
/* ── DS v1.2.5 TOKENS ── */
:root {
  --bg:          #0a0a0b;
  --bg-elev:     #0f1013;
  --bg-elev-2:   #14161b;
  --bg-soft:     #181b21;
  --line:        rgba(255,255,255,.08);
  --line-strong: rgba(255,255,255,.14);
  --text:        #f3f5f7;
  --muted:       #98a2b3;
  --muted-2:     #6f7785;
  --cyan:        #00ccff;
  --cyan-soft:   rgba(0,204,255,.10);
  --cyan-soft-2: rgba(0,204,255,.16);
  --cyan-label:  rgba(0,204,255,.52);
  --text-cyan-muted: rgba(0,195,240,.45);
  --green:       #15d49c;
  --green-soft:  rgba(21,212,156,.12);
  --amber:       #ffb020;
  --red:         #ff637d;
  --glow:        0 0 0 1px rgba(0,204,255,.14) inset;
  --shadow-sm:   0 2px 8px rgba(0,0,0,.14);
  --shadow-md:   0 8px 24px rgba(0,0,0,.18);
  --shadow-lg:   0 16px 32px rgba(0,0,0,.22);
  --sans:        'Inter', ui-sans-serif, system-ui, sans-serif;
  --mono:        'IBM Plex Mono', ui-monospace, monospace;
  --display:     'Plus Jakarta Sans', ui-sans-serif, system-ui, sans-serif;
  --radius-xs:   6px;
  --radius-sm:   10px;
  --radius:      14px;
  --radius-md:   16px;
  --radius-lg:   18px;
  --radius-xl:   24px;
  --radius-pill: 999px;
  --tr:          180ms ease;
  --topbar-h:    54px;
  --sidebar-w:   252px;
}
html[data-theme="light"] {
  --bg:          #eeece7;
  --bg-elev:     #f6f4ef;
  --bg-elev-2:   #ffffff;
  --bg-soft:     #ece9e2;
  --line:        rgba(0,0,0,.08);
  --line-strong: rgba(0,0,0,.13);
  --text:        #17191c;
  --muted:       #586170;
  --muted-2:     #7f8896;
  --cyan:        #009fc7;
  --cyan-soft:   rgba(0,159,199,.10);
  --cyan-soft-2: rgba(0,159,199,.16);
  --cyan-label:  rgba(0,159,199,.52);
  --text-cyan-muted: rgba(0,140,175,.48);
  --glow:        0 0 0 1px rgba(0,159,199,.14) inset;
  --shadow-sm:   0 2px 8px rgba(16,36,54,.08);
  --shadow-md:   0 8px 24px rgba(16,36,54,.12);
  --shadow-lg:   0 16px 32px rgba(16,36,54,.16);
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { overflow-x: clip; height: 100%; }
body {
  font-family: var(--sans);
  background:
    radial-gradient(circle at 72% 8%, rgba(0,204,255,.07), transparent 28%),
    radial-gradient(circle at 12% 60%, rgba(0,204,255,.04), transparent 22%),
    var(--bg);
  color: var(--text);
  height: 100vh;
  overflow: hidden;
  display: flex;
  flex-direction: column;
  line-height: 1.4;
}
html[data-theme="light"] body {
  background:
    radial-gradient(circle at 72% 8%, rgba(0,159,199,.06), transparent 28%),
    radial-gradient(circle at 12% 60%, rgba(0,159,199,.04), transparent 22%),
    var(--bg);
}
a, button { font: inherit; cursor: pointer; }
h1,h2,h3,h4,p { margin: 0; }
.yql { fill: var(--text); }
.yqs { fill: var(--cyan); }
/* ── TOPBAR ── */
.topbar {
  position: sticky; top: 0; z-index: 100;
  height: var(--topbar-h);
  min-height: var(--topbar-h);
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 20px;
  gap: 16px;
  background: rgba(10,10,11,.82);
  backdrop-filter: blur(16px);
  -webkit-backdrop-filter: blur(16px);
  border-bottom: 1px solid var(--line);
  flex-shrink: 0;
}
html[data-theme="light"] .topbar { background: rgba(238,236,231,.88); }
.topbar-left { display:flex; align-items:center; gap:14px; }
.topbar-divider { width:1px; height:20px; background:var(--line-strong); flex-shrink:0; }
.iaready-pill {
  display: flex;
  align-items: center;
  padding: 4px 10px;
  background: var(--cyan-soft);
  border-radius: var(--radius-pill);
  box-shadow: 0 0 0 1px rgba(0,204,255,.18) inset;
}
.topbar-right { display:flex; align-items:center; gap:10px; }
.theme-toggle {
  display:inline-flex; align-items:center;
  background:var(--bg-elev-2); border-radius:var(--radius-pill);
  padding:3px; gap:1px; box-shadow:var(--shadow-sm);
}
.theme-opt {
  display:inline-flex; align-items:center; justify-content:center; gap:5px;
  padding:4px 10px; border:none; border-radius:var(--radius-pill);
  background:transparent; color:var(--muted-2);
  font:500 11px var(--sans); cursor:pointer;
  transition:background var(--tr),color var(--tr); white-space:nowrap;
}
.theme-opt svg { width:13px;height:13px;stroke:currentColor;fill:none;stroke-width:1.9;stroke-linecap:round;stroke-linejoin:round;flex-shrink:0; }
.theme-opt:hover { color:var(--text); }
.theme-opt.active { background:var(--bg-elev);color:var(--text); }
.clear-btn {
  font:500 11px var(--mono); color:var(--muted);
  background:var(--bg-elev-2); border:none;
  border-radius:var(--radius-sm); padding:5px 11px;
  cursor:pointer; transition:all var(--tr); letter-spacing:.04em;
}
.clear-btn:hover { background:rgba(255,99,125,.08); color:var(--red); }
/* ── APP SHELL ── */
.app-shell { flex:1; display:flex; overflow:hidden; min-height:0; }
/* ── SIDEBAR ── */
.sidebar {
  width:var(--sidebar-w); flex-shrink:0;
  display:flex; flex-direction:column;
  background:linear-gradient(180deg, rgba(20,22,27,.96), rgba(15,16,19,.92));
  backdrop-filter:blur(18px);
  border-right:1px solid var(--line);
  padding:20px 14px; gap:2px; overflow-y:auto;
  animation:slideIn .38s cubic-bezier(.22,1,.36,1);
}
html[data-theme="light"] .sidebar {
  background:linear-gradient(180deg,rgba(238,236,231,.98),rgba(230,228,223,.96));
}
@keyframes slideIn {
  from{transform:translateX(-18px);opacity:0}
  to  {transform:translateX(0);opacity:1}
}
.sidebar-brand {
  display:flex; flex-direction:column; gap:6px;
  padding:0 4px 16px; border-bottom:1px solid var(--line); margin-bottom:6px;
}
.brand-label {
  font:700 9px var(--mono); letter-spacing:.14em;
  text-transform:uppercase; color:var(--text-cyan-muted);
}
.nav-label {
  font:700 9px var(--mono); letter-spacing:.14em;
  text-transform:uppercase; color:var(--muted-2);
  padding:10px 8px 4px;
}
.nav-item {
  display:flex; align-items:center; gap:9px;
  padding:9px 10px; border-radius:var(--radius-sm);
  border:none; background:transparent;
  color:var(--muted); text-decoration:none;
  font:500 13px var(--sans); transition:all var(--tr);
  cursor:pointer; width:100%; text-align:left;
}
.nav-item:hover { background:var(--cyan-soft); color:var(--text); }
.nav-item.active { background:var(--cyan-soft-2); color:var(--text-cyan-muted); box-shadow:var(--glow); }
.nav-icon { width:16px;height:16px;flex-shrink:0;stroke:currentColor;fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round;opacity:.85; }
.sidebar-footer { margin-top:auto; padding:12px 6px 0; border-top:1px solid var(--line); }
.status-pill {
  display:inline-flex; align-items:center; gap:6px;
  font:500 10px var(--mono); color:var(--muted);
  padding:5px 10px; border-radius:var(--radius-pill);
  background:var(--bg-elev-2); box-shadow:var(--shadow-sm);
}
.dot-live {
  width:6px;height:6px;border-radius:50%;
  background:var(--green);box-shadow:0 0 6px var(--green);
  animation:livepulse 2s ease infinite;
}
@keyframes livepulse { 0%,100%{opacity:1}50%{opacity:.35} }
/* ── MAIN ── */
.main { flex:1; display:flex; flex-direction:column; min-width:0; animation:fadeUp .45s cubic-bezier(.22,1,.36,1) .08s both; }
@keyframes fadeUp { from{transform:translateY(10px);opacity:0}to{transform:translateY(0);opacity:1} }
.ctx-bar {
  padding:10px 22px; border-bottom:1px solid var(--line);
  background:var(--cyan-soft); display:flex; align-items:center;
  gap:8px; flex-wrap:wrap; flex-shrink:0;
}
.ctx-label { font:700 9px var(--mono);letter-spacing:.12em;text-transform:uppercase;color:var(--text-cyan-muted); }
.ctx-name {
  font:600 11px var(--mono); color:var(--cyan);
  background:var(--cyan-soft-2); box-shadow:0 0 0 1px rgba(0,204,255,.18) inset;
  border-radius:var(--radius-pill); padding:3px 9px; letter-spacing:.04em;
}
.chips-wrap { display:flex; gap:6px; flex-wrap:wrap; margin-left:6px; }
.chip {
  font:500 11px var(--sans); padding:4px 11px;
  border-radius:var(--radius-pill); border:none;
  color:var(--muted); cursor:pointer; transition:all var(--tr);
  background:var(--bg-elev-2); white-space:nowrap;
}
.chip:hover { color:var(--cyan);background:var(--cyan-soft); }
.chat-area {
  flex:1; overflow-y:auto; padding:24px 22px;
  display:flex; flex-direction:column; gap:18px; scroll-behavior:smooth;
}
.chat-area::-webkit-scrollbar{width:4px}
.chat-area::-webkit-scrollbar-track{background:transparent}
.chat-area::-webkit-scrollbar-thumb{background:var(--line-strong);border-radius:2px}
.welcome {
  display:flex; flex-direction:column; align-items:center;
  justify-content:center; flex:1; gap:14px; text-align:center; padding:40px 20px;
  animation:fadeUp .5s ease;
}
.welcome-logos {
  display:flex; flex-direction:column; align-items:center; gap:10px;
  padding:20px 28px; background:var(--bg-elev-2);
  border-radius:var(--radius-lg); box-shadow:var(--shadow-md);
}
.welcome-sep { width:32px;height:1px;background:var(--line-strong); }
.welcome h2 { font:700 18px var(--display);letter-spacing:-.025em;color:var(--text); }
.welcome p  { font-size:13px;color:var(--muted);max-width:300px;line-height:1.6; }
.msg { display:flex;gap:10px;animation:msgIn .22s ease;max-width:100%; }
@keyframes msgIn { from{transform:translateY(6px);opacity:0}to{transform:translateY(0);opacity:1} }
.msg.user { flex-direction:row-reverse; }
.avatar {
  width:28px;height:28px;border-radius:8px;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;
  font:700 10px var(--mono);letter-spacing:.04em;
}
.msg.user .avatar { background:var(--bg-elev-2);color:var(--muted); }
.msg.ai   .avatar { background:var(--cyan-soft-2);color:var(--cyan);font-size:14px; }
.bubble {
  max-width:calc(100% - 60px); padding:11px 15px;
  border-radius:var(--radius-sm); font-size:13.5px; line-height:1.65;
  box-shadow:var(--shadow-sm);
}
.msg.user .bubble { background:var(--bg-elev-2);color:var(--text);border-top-right-radius:4px; }
.msg.ai   .bubble { background:var(--bg-elev);color:var(--text);border-top-left-radius:4px; }
.bubble strong { color:var(--cyan);font-weight:600; }
.bubble code { font:500 12px var(--mono);background:var(--cyan-soft);padding:2px 6px;border-radius:5px;color:var(--cyan); }
.bubble p { margin-bottom:6px; }
.bubble p:last-child { margin-bottom:0; }
.bubble .step-list { list-style:none;padding:0;margin:8px 0 0;display:flex;flex-direction:column;gap:7px; }
.bubble .step-list li { display:flex;gap:10px;align-items:flex-start;font-size:13px; }
.bubble .step-list li::before {
  content:attr(data-n); min-width:20px;height:20px;border-radius:50%;
  background:var(--cyan-soft);
  color:var(--cyan);font:700 10px var(--mono);
  display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px;
}
.thinking { display:flex;gap:10px;align-items:center; }
.thinking .avatar { width:28px;height:28px;border-radius:8px;background:var(--cyan-soft-2);display:flex;align-items:center;justify-content:center;color:var(--cyan);font-size:14px;flex-shrink:0; }
.dots { display:flex;gap:5px;padding:11px 15px;background:var(--bg-elev);border-radius:var(--radius-sm);border-top-left-radius:4px;box-shadow:var(--shadow-sm); }
.dots span { width:6px;height:6px;background:var(--cyan);border-radius:50%;opacity:.25;animation:blink 1.1s ease infinite; }
.dots span:nth-child(2){animation-delay:.18s}
.dots span:nth-child(3){animation-delay:.36s}
@keyframes blink { 0%,80%,100%{opacity:.2;transform:scale(.9)}40%{opacity:1;transform:scale(1)} }
.input-bar {
  padding:14px 22px;border-top:1px solid var(--line);
  background:rgba(10,10,11,.7);backdrop-filter:blur(12px);
  display:flex;gap:10px;align-items:flex-end;flex-shrink:0;
}
html[data-theme="light"] .input-bar { background:rgba(238,236,231,.8); }
textarea {
  flex:1;background:var(--bg-elev-2);border:1px solid var(--line);
  border-radius:var(--radius-sm);color:var(--text);
  font:400 13.5px var(--sans);padding:10px 13px;resize:none;outline:none;
  min-height:42px;max-height:120px;line-height:1.5;
  transition:border-color var(--tr),box-shadow var(--tr);
}
textarea:focus { border-color:rgba(0,204,255,.28);box-shadow:var(--glow); }
textarea::placeholder { color:var(--muted-2); }
.send-btn {
  width:42px;height:42px;border-radius:var(--radius-sm);
  background:var(--cyan);border:none;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  transition:all var(--tr);flex-shrink:0;box-shadow:var(--shadow-sm);
}
.send-btn:hover { background:#33d6ff;transform:translateY(-1px);box-shadow:0 6px 18px rgba(0,204,255,.28); }
.send-btn:active { transform:translateY(0); }
.send-btn:disabled { opacity:.35;cursor:not-allowed;transform:none;box-shadow:none; }
.send-btn svg { width:17px;height:17px;stroke:#000;fill:none;stroke-width:2.5;stroke-linecap:round;stroke-linejoin:round; }
.footer-ds {
  text-align:center;padding:5px;
  font:400 10px var(--mono);color:var(--muted-2);
  border-top:1px solid var(--line);letter-spacing:.04em;flex-shrink:0;
}
@media(max-width:720px){
  .sidebar{display:none}
  .chat-area{padding:16px 14px}
  .input-bar{padding:10px 14px}
}
</style>
</head>

function appendMsg(role,html){
  document.getElementById('welcome')?.remove();
  const chat=document.getElementById('chat');
  const d=document.createElement('div');
  d.className=`msg ${role}`;
  d.innerHTML=role==='user'
    ?`<div class="avatar">TÚ</div><div class="bubble">${escapeHtml(html)}</div>`
    :`<div class="avatar">✦</div><div class="bubble">${html}</div>`;
  chat.appendChild(d);
  chat.scrollTop=chat.scrollHeight;
}
function showThinking(){
  document.getElementById('welcome')?.remove();
  const chat=document.getElementById('chat');
  const d=document.createElement('div');
  d.className='thinking';
  d.id='thinking';
  d.innerHTML=`<div class="avatar">✦</div><div class="dots"><span></span><span></span><span></span></div>`;
  chat.appendChild(d);chat.scrollTop=chat.scrollHeight;
}
function removeThinking(){document.getElementById('thinking')?.remove()}
function escapeHtml(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}
function formatResponse(text){
  text=text.replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>');
  text=text.replace(/`([^`]+)`/g,'<code>$1</code>');
  const lines=text.split('\n');
  let result='',inList=false,items=[];
  for(const line of lines){
    const m=line.match(/^(\d+)\.\s+(.+)/);
    if(m){
      if(!inList){inList=true;items=[];}
      items.push({n:m[1],t:m[2]});
    } else {
      if(inList){result+=`<ul class="step-list">${items.map(i=>`<li data-n="${i.n}">${i.t}</li>`).join('')}</ul>`;items=[];inList=false;}
      if(line.trim())result+=`<p>${line}</p>`;
    }
  }
  if(inList)result+=`<ul class="step-list">${items.map(i=>`<li data-n="${i.n}">${i.t}</li>`).join('')}</ul>`;
  return result;
}
async function sendMessage(){
  const input=document.getElementById('input');
  const text=input.value.trim();
  if(!text||isLoading)return;
  input.value='';autoResize(input);
  isLoading=true;document.getElementById('send-btn').disabled=true;
  messages.push({role:'user',content:`[Módulo: ${currentContext}] ${text}`});
  appendMsg('user',text);showThinking();
  try{
    const res=await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:1000,system:SYSTEM,messages})
    });
    const data=await res.json();
    const reply=data.content?.[0]?.text||'No pude procesar la consulta. Intenta de nuevo.';
    messages.push({role:'assistant',content:reply});
    removeThinking();appendMsg('ai',formatResponse(reply));
  }catch(e){
    removeThinking();appendMsg('ai','<p>Error de conexión con la IA. Verifica tu red e intenta de nuevo.</p>');
  }
  isLoading=false;document.getElementById('send-btn').disabled=false;input.focus();
}
function handleKey(e){if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendMessage()}}
function autoResize(el){el.style.height='auto';el.style.height=Math.min(el.scrollHeight,120)+'px'}
