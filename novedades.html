<!DOCTYPE html>
<html data-theme="system" lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Novedades de producto · YiQi ERP</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@700;800&family=Inter:wght@300;400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="./site.css">
<script src="./components/site-header.js" defer></script>
<style>
/* ── Tokens — copia exacta de index.html ── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { overflow-x: clip; }
body {
  font-family: var(--sans);
  color: var(--text);
  line-height: 1.4;
  background:
    radial-gradient(ellipse at 80% 0%,  rgba(0,204,255,.09), transparent 40%),
    radial-gradient(ellipse at 10% 30%, rgba(0,204,255,.05), transparent 32%),
    radial-gradient(ellipse at 55% 90%, rgba(0,204,255,.04), transparent 28%),
    linear-gradient(rgba(255,255,255,.018) 1px, transparent 1px),
    linear-gradient(90deg, rgba(255,255,255,.018) 1px, transparent 1px),
    var(--bg);
  background-size: auto, auto, auto, 52px 52px, 52px 52px, auto;
  min-height: 100vh;
}
[data-theme="light"] body {
  background:
    radial-gradient(ellipse at 80% 0%,  rgba(0,159,199,.08), transparent 40%),
    radial-gradient(ellipse at 10% 30%, rgba(0,159,199,.04), transparent 32%),
    radial-gradient(ellipse at 55% 90%, rgba(0,159,199,.03), transparent 28%),
    linear-gradient(rgba(0,0,0,.032) 1px, transparent 1px),
    linear-gradient(90deg, rgba(0,0,0,.032) 1px, transparent 1px),
    var(--bg);
  background-size: auto, auto, auto, 52px 52px, 52px 52px, auto;
}

/* ── Layout ── */
.nov-page {
  max-width: 1120px;
  margin: 0 auto;
  padding: 0 24px 80px;
}

/* ── Header section ── */
.nov-hero {
  padding: 72px 0 56px;
  text-align: left;
}
.nov-kicker {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 4px 10px; border-radius: var(--radius-pill);
  background: var(--cyan-soft); color: var(--cyan);
  font: 700 10px var(--mono); letter-spacing: .10em;
  text-transform: uppercase; margin-bottom: 20px; border: none;
}
.nov-title {
  font: 800 clamp(32px,5vw,52px)/1.1 var(--display);
  color: var(--text);
  margin-bottom: 10px;
}
.nov-sub {
  font: 400 15px/1.6 var(--sans);
  color: var(--muted);
}

/* ── Filtros ── */
.nov-featured { background: var(--cyan-soft); border-radius: 16px; padding: 24px 26px; margin-bottom: 28px; }
.nov-feat-badges { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; margin-bottom: 10px; }
.nov-feat-tag { font: 600 10px var(--mono); letter-spacing: .08em; text-transform: uppercase; color: var(--cyan); background: var(--cyan-soft-2, rgba(0,204,255,.16)); padding: 4px 10px; border-radius: 999px; }
.nov-feat-title { font: 700 22px/1.2 var(--display, var(--sans)); letter-spacing: -.01em; color: var(--text); margin: 0 0 8px; }
.nov-feat-desc { font: 400 14px/1.55 var(--sans); color: var(--muted); margin: 0; white-space: pre-line; max-width: 62ch; }
.nov-featured .nov-link { margin-top: 14px; }
@media (max-width: 560px){ .nov-feat-title{ font-size: 19px; } .nov-featured{ padding: 18px; } }
.nov-filters {
  display: flex;
  flex-direction: column;
  gap: 12px;
  margin-bottom: 36px;
}
.nov-filter-row {
  display: flex;
  flex-wrap: wrap;
  align-items: center;
  gap: 8px;
}
.nov-filter-label {
  font: 500 12px/1 var(--sans);
  color: var(--muted-2);
  margin-right: 4px;
}
.nov-search-wrap {
  width: min(100%, 460px);
}
.filter-chip {
  font: 500 12px/1 var(--sans);
  padding: 5px 12px;
  border-radius: var(--radius-pill);
  border: none;
  background: var(--bg-soft);
  color: var(--muted);
  cursor: pointer;
  transition: all var(--tr);
  white-space: nowrap;
}
.filter-chip:hover {
  color: var(--text);
}
.filter-chip.active {
  background: var(--cyan-soft);
  border: none;
  color: var(--cyan);
}
.filter-sep {
  width: 1px;
  height: 20px;
  background: var(--line);
  flex-shrink: 0;
}

/* ── Lista ── */
.nov-list {
  display: flex;
  flex-direction: column;
  gap: 0;
}

/* ── Card ── */
.nov-card {
  display: flex;
  gap: 24px;
  padding: 24px 0;
  border-bottom: 1px solid var(--line);
  transition: opacity var(--tr);
}
.nov-card:first-child { border-top: 1px solid var(--line); }
.nov-card.hidden { display: none; }

/* Columna izquierda: fecha */
.nov-date-col {
  flex-shrink: 0;
  width: 90px;
  padding-top: 2px;
  text-align: right;
}
.nov-date-day {
  font: 700 22px/1 var(--display);
  color: var(--text);
  display: block;
}
.nov-date-month {
  font: 500 11px/1.3 var(--mono);
  letter-spacing: .06em;
  text-transform: uppercase;
  color: var(--muted);
  display: block;
  margin-top: 3px;
}
.nov-date-year {
  font: 400 11px/1 var(--mono);
  color: var(--muted-2);
  display: block;
  margin-top: 2px;
}

/* Divisor vertical */
.nov-divider {
  flex-shrink: 0;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 0;
}
.nov-divider-dot {
  width: 8px;
  height: 8px;
  border-radius: 50%;
  background: var(--line-strong);
  margin-top: 6px;
  flex-shrink: 0;
}
.nov-divider-line {
  flex: 1;
  width: 1px;
  background: var(--line);
  margin-top: 6px;
}
.nov-card:last-child .nov-divider-line { display: none; }

/* Contenido principal */
.nov-body {
  flex: 1;
  min-width: 0;
}
.nov-badges {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
  margin-bottom: 10px;
}
.nov-badge {
  font: 600 10px/1 var(--mono);
  letter-spacing: .08em;
  text-transform: uppercase;
  padding: 3px 8px;
  border-radius: var(--radius-xs);
}
.badge-mejora     { background: var(--cyan-soft);   color: var(--cyan);   }
.badge-nueva      { background: var(--green-soft);  color: var(--green);  }
.badge-performance{ background: var(--purple-soft); color: var(--purple); }
.badge-modulo {
  background: var(--bg-soft);
  color: var(--muted);
  border: 1px solid var(--line);
}
.nov-card-title {
  font: 600 16px/1.3 var(--sans);
  color: var(--text);
  margin-bottom: 8px;
}
.nov-card-desc {
  font: 400 14px/1.65 var(--sans);
  color: var(--muted);
  white-space: pre-line;
  margin-bottom: 12px;
}
.nov-link {
  display: inline-flex;
  align-items: center;
  gap: 5px;
  font: 500 12px/1 var(--sans);
  color: var(--cyan);
  text-decoration: none;
  transition: opacity var(--tr);
}
.nov-link:hover { opacity: .75; }
.nov-link svg { flex-shrink: 0; }

/* ── Estado vacío / error / loading ── */
.nov-state {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 64px 24px;
  text-align: center;
  gap: 12px;
}
.nov-state-icon {
  width: 40px;
  height: 40px;
  border-radius: 50%;
  background: var(--bg-soft);
  display: flex;
  align-items: center;
  justify-content: center;
}
.nov-state-title {
  font: 600 15px/1.3 var(--sans);
  color: var(--text);
}
.nov-state-sub {
  font: 400 13px/1.5 var(--sans);
  color: var(--muted);
  max-width: 340px;
}

/* ── Count ── */
.nov-count {
  font: 400 13px/1 var(--sans);
  color: var(--muted-2);
  margin-bottom: 20px;
}
.nov-count strong { color: var(--muted); }

/* ── Skeleton loading ── */
.skeleton {
  border-radius: var(--radius-sm);
  background: linear-gradient(90deg, var(--bg-soft) 25%, var(--line) 50%, var(--bg-soft) 75%);
  background-size: 200% 100%;
  animation: shimmer 1.4s infinite;
}
@keyframes shimmer {
  0%   { background-position: 200% 0; }
  100% { background-position: -200% 0; }
}
.skel-card {
  display: flex;
  gap: 24px;
  padding: 24px 0;
  border-bottom: 1px solid var(--line);
}
.skel-card:first-child { border-top: 1px solid var(--line); }
.skel-date { width: 90px; flex-shrink: 0; }
.skel-date-d { height: 28px; width: 40px; margin-left: auto; margin-bottom: 6px; }
.skel-date-m { height: 10px; width: 50px; margin-left: auto; }
.skel-body { flex: 1; }
.skel-badge-row { display: flex; gap: 6px; margin-bottom: 10px; }
.skel-badge { height: 16px; width: 60px; }
.skel-title { height: 18px; width: 65%; margin-bottom: 10px; }
.skel-line { height: 12px; width: 100%; margin-bottom: 6px; }
.skel-line.short { width: 75%; }

@media (max-width: 600px) {
  .nov-date-col { width: 60px; }
  .nov-date-day { font-size: 18px; }
  .nov-title { font-size: 24px; }
  .nov-card { gap: 14px; }
  .nov-divider { display: none; }
}
</style>
  <script src="./components/clarity.js"></script>

<body>
<site-header base="./" current-page="novedades"></site-header>

<main class="nov-page" id="nov-page">

  <!-- Hero -->
  <div class="nov-hero">
    <span class="nov-kicker">Changelog</span>
    <h1 class="nov-title">Novedades de producto</h1>
    <p class="nov-sub">Mejoras, nuevas funciones y optimizaciones de rendimiento que lanzamos en YiQi ERP.</p>
  </div>

  <!-- Última novedad (destacada · se actualiza sola) -->

      <input id="nov-search" class="search-input" type="search" placeholder="Buscar por título, descripción, tipo o módulo" autocomplete="off" aria-label="Buscar novedades">
      <button class="search-clear" id="nov-search-clear" aria-label="Limpiar"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button>

      </div>
      <div class="skel-body">
        <div class="skel-badge-row">

      </div>

      <div class="skel-date">
        <div class="skeleton skel-date-d"></div>

      <div class="skel-body">

<site-footer base="./"></site-footer>

<script>
if (window.location.hostname === 'yiqi.com.ar') {
  const target = `https://www.yiqi.com.ar${window.location.pathname}${window.location.search}${window.location.hash}`;
  window.location.replace(target);
}

// Endpoint local servido por server.js (proxy backend con auth a YiQi API).
const API = '/api/novedades';

const MESES = ['Ene','Feb','Mar','Abr','May','Jun','Jul','Ago','Sep','Oct','Nov','Dic'];
const TIPO_CLASS = {
  'Mejora':             'badge-mejora',
  'Nueva funcionalidad':'badge-nueva',
  'Performance':        'badge-performance',
};
const TIPO_LABEL = {
  'Mejora':             'Mejora',
  'Nueva funcionalidad':'Nueva función',
  'Performance':        'Performance',
};

let allItems = [];
let activeFilters = { tipo: '', modulo: '' };
let searchTerm = '';

function escapeHtml(value) {
  return String(value || '')
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;')
    .replace(/'/g, '&#39;');
}

function formatDate(rawDate) {
  const d = rawDate ? new Date(rawDate) : null;
  if (!d || Number.isNaN(d.getTime())) {
    return { day: '--', month: '---', year: '----' };
  }

  return {
    day:   d.getUTCDate().toString().padStart(2,'0'),
    month: MESES[d.getUTCMonth()],
    year:  d.getUTCFullYear(),
  };
}

function badgeHtml(tipo, modulo) {
  const safeTipo = (tipo || '').trim() || 'Mejora';
  const safeModulo = (modulo || '').trim() || 'General';
  const tc = TIPO_CLASS[safeTipo] || 'badge-mejora';
  const tl = TIPO_LABEL[safeTipo] || safeTipo;
  return `
    <span class="nov-badge ${tc}">${escapeHtml(tl)}</span>
    <span class="nov-badge badge-modulo">${escapeHtml(safeModulo)}</span>
  `.trim();
}

function cardHtml(item) {
  const {day, month, year} = formatDate(item.fecha);
  const desc = (item.descripcion || '').replace(/\r\n/g, '\n').trim();
  const linkHtml = item.linkWiki
    ? `<a class="nov-link" href="${escapeHtml(item.linkWiki)}" target="_blank" rel="noopener">
        <svg width="12" height="12" viewBox="0 0 12 12" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M1 11L11 1M11 1H4M11 1V8" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
        Ver documentación
       </a>`
    : '';

  return `
<div class="nov-card" data-tipo="${escapeHtml(item.tipo || '')}" data-modulo="${escapeHtml(item.modulo || '')}" role="listitem">
  <div class="nov-date-col">
    <span class="nov-date-day">${day}</span>
    <span class="nov-date-month">${month}</span>
    <span class="nov-date-year">${year}</span>
  </div>
  <div class="nov-divider">
    <div class="nov-divider-dot"></div>
    <div class="nov-divider-line"></div>
  </div>
  <div class="nov-body">
    <div class="nov-badges">${badgeHtml(item.tipo, item.modulo)}</div>
    <h2 class="nov-card-title">${escapeHtml(item.titulo || 'Sin titulo')}</h2>
    <p class="nov-card-desc">${escapeHtml(desc)}</p>
    ${linkHtml}
  </div>
</div>`.trim();
}

function populateModuleFilters(items) {
  const modulos = [...new Set(items.map(i => i.modulo).filter(Boolean))].sort();
  const container = document.getElementById('nov-filters-modulo');
  modulos.forEach(mod => {
    const btn = document.createElement('button');
    btn.className = 'filter-chip';
    btn.dataset.group = 'modulo';
    btn.dataset.value = mod;
    btn.textContent = mod;
    container.appendChild(btn);
  });
}

function cardFeaturedHtml(item) {
  const {day, month, year} = formatDate(item.fecha);
  const desc = (item.descripcion || '').replace(/\r\n/g, '\n').trim();
  const linkHtml = item.linkWiki
    ? `<a class="nov-link" href="${escapeHtml(item.linkWiki)}" target="_blank" rel="noopener"><svg width="12" height="12" viewBox="0 0 12 12" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M1 11L11 1M11 1H4M11 1V8" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg> Ver documentación</a>`
    : '';
  return `
    <div class="nov-feat-badges"><span class="nov-feat-tag">Última novedad · ${day} ${month} ${year}</span>${badgeHtml(item.tipo, item.modulo)}</div>
    <h2 class="nov-feat-title">${escapeHtml(item.titulo || 'Sin titulo')}</h2>
    <p class="nov-feat-desc">${escapeHtml(desc)}</p>
    ${linkHtml}`.trim();
}

function applyFilters() {
  const cards = document.querySelectorAll('.nov-card');
  const normalizedSearch = searchTerm.trim().toLowerCase();
  let visible = 0;
  cards.forEach(card => {
    const matchTipo   = !activeFilters.tipo   || card.dataset.tipo   === activeFilters.tipo;
    const matchModulo = !activeFilters.modulo || card.dataset.modulo === activeFilters.modulo;
    const text = `${card.dataset.search || ''}`.toLowerCase();
    const matchSearch = !normalizedSearch || text.includes(normalizedSearch);

    if (matchTipo && matchModulo && matchSearch) {
      card.classList.remove('hidden');
      visible++;
    } else {
      card.classList.add('hidden');
    }
  });
  const countEl = document.getElementById('nov-count');
  countEl.style.display = '';
  countEl.innerHTML = `Mostrando <strong>${visible}</strong> de <strong>${cards.length}</strong> novedades`;

  // Empty state
  let emptyEl = document.getElementById('nov-empty');
  if (visible === 0) {
    if (!emptyEl) {
      emptyEl = document.createElement('div');
      emptyEl.id = 'nov-empty';
      emptyEl.className = 'nov-state';
      emptyEl.innerHTML = `
        <div class="nov-state-icon">
          <svg width="18" height="18" viewBox="0 0 18 18" fill="none">
            <circle cx="9" cy="9" r="7.5" stroke="currentColor" stroke-width="1.5" opacity=".4"/>
            <path d="M6 9h6M9 6v6" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
          </svg>
        </div>
        <p class="nov-state-title">Sin resultados</p>
        <p class="nov-state-sub">No hay novedades que coincidan con los filtros seleccionados.</p>
      `;
      document.getElementById('nov-list').after(emptyEl);
    }
    emptyEl.style.display = 'flex';
  } else if (emptyEl) {
    emptyEl.style.display = 'none';
  }
}

function bindFilters() {
  document.querySelectorAll('.nov-filter-row').forEach((row) => {
    row.addEventListener('click', e => {
      const chip = e.target.closest('.filter-chip');
      if (!chip) return;
      const group = chip.dataset.group;
      const value = chip.dataset.value;

      row.querySelectorAll(`.filter-chip[data-group="${group}"]`).forEach(c => c.classList.remove('active'));
      chip.classList.add('active');
      activeFilters[group] = value;
      applyFilters();
    });
  });

  const novSearchInput = document.getElementById('nov-search');
  const novSearchClear = document.getElementById('nov-search-clear');

  novSearchInput.addEventListener('input', (e) => {
    searchTerm = e.target.value || '';
    novSearchClear.classList.toggle('visible', searchTerm.length > 0);
    applyFilters();
  });

  novSearchClear.addEventListener('click', () => {
    novSearchInput.value = '';
    searchTerm = '';
    novSearchClear.classList.remove('visible');
    applyFilters();
    novSearchInput.focus();
  });
}

function buildSearchText(item) {
  return [
    item.titulo,
    item.descripcion,
    item.modulo,
    item.tipo,
  ]
    .filter(Boolean)
    .join(' ');
}

function renderItems(items) {
  return items.map((item) => {
    const baseCard = cardHtml(item);
    const search = escapeHtml(buildSearchText(item));
    return baseCard.replace('<div class="nov-card"', `<div class="nov-card" data-search="${search}"`);
  }).join('\n');
}

function showError(msg) {
  document.getElementById('nov-list').innerHTML = `
    <div class="nov-state">
      <div class="nov-state-icon" style="color:var(--red)">
        <svg width="18" height="18" viewBox="0 0 18 18" fill="none">
          <circle cx="9" cy="9" r="7.5" stroke="currentColor" stroke-width="1.5" opacity=".5"/>
          <path d="M9 5.5v4M9 12.5v.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
        </svg>
      </div>
      <p class="nov-state-title">No se pudo cargar el changelog</p>
      <p class="nov-state-sub">${msg}</p>
    </div>
  `;
}

async function loadNovedades() {
  try {
    const res = await fetch(API, { cache: 'no-store' });
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const contentType = res.headers.get('content-type') || '';
    if (!contentType.includes('application/json')) {
      throw new Error('La respuesta no es JSON valido. Verifica que el sitio se ejecute con node server.js.');
    }
    const payload = await res.json();
    allItems = Array.isArray(payload.items) ? payload.items : [];

    populateModuleFilters(allItems);
    bindFilters();

    const list = document.getElementById('nov-list');
    if (allItems.length === 0) {
      showError('No hay novedades publicadas en este momento.');
      return;
    }

    allItems.sort((a, b) => {
      const da = a.fecha ? new Date(a.fecha).getTime() : 0;
      const db = b.fecha ? new Date(b.fecha).getTime() : 0;
      return (db || 0) - (da || 0);
    });

    const feat = document.getElementById('nov-featured');
    feat.innerHTML = cardFeaturedHtml(allItems[0]);
    feat.hidden = false;

    list.innerHTML = renderItems(allItems.slice(1));

    applyFilters();
  } catch (err) {
    const message = err instanceof Error ? err.message : String(err);
    let hint = message.includes('Failed to fetch') || message.includes('NetworkError')
      ? 'No se pudo contactar al servidor local. Verifica que el sitio este iniciado con node server.js.'
      : message;
    showError(hint);
    console.error('[novedades]', err);
  }
}

loadNovedades();
</script>
<script src="./components/meta-pixel-events.js" defer></script>
