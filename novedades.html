<!DOCTYPE html>
<html data-theme="system" lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Novedades de producto · YiQi ERP</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@700;800&family=Inter:wght@300;400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="./site.css">
<script src="./components/site-header.js" defer></script>
<style>
/* ── Tokens — copia exacta de index.html ── */
:root {
  --bg:          #0a0a0b;
  --bg-elev:     #0f1013;
  --bg-elev-2:   #14161b;
  --bg-soft:     #181b21;
  --line:        rgba(255,255,255,.08);
  --line-strong: rgba(255,255,255,.14);
  --text:        #f3f5f7;
  --muted:       #908e8e;
  --muted-2:     #625f5f;
  --cyan:        #00ccff;
  --cyan-soft:   rgba(0,204,255,.10);
  --cyan-soft-2: rgba(0,204,255,.16);
  --cyan-label:  rgba(0,204,255,.52);
  --text-cyan-muted: rgba(0,195,240,.62);
  --green:       #15d49c;
  --green-soft:  rgba(21,212,156,.12);
  --amber:       #ffb020;
  --amber-soft:  rgba(255,176,32,.12);
  --red:         #ff637d;
  --red-soft:    rgba(255,99,125,.12);
  --blue:        #7ab7ff;
  --purple:      #a78bfa;
  --purple-soft: rgba(167,139,250,.12);
  --warm:        #b5a090;
  --warm-soft:   rgba(181,160,144,.10);
  --glow:        0 0 0 1px rgba(0,204,255,.14) inset;
  --shadow-sm:   0 1px 4px rgba(0,0,0,.10);
  --shadow-md:   0 2px 16px rgba(0,0,0,.14);
  --shadow-lg:   0 8px 32px rgba(0,0,0,.22);
  --sans:        'Inter', ui-sans-serif, system-ui, sans-serif;
  --display:     'Plus Jakarta Sans', ui-sans-serif, system-ui, sans-serif;
  --mono:        'IBM Plex Mono', ui-monospace, monospace;
  --topbar-h:    56px;
  --radius-xs:   6px;
  --radius-sm:   10px;
  --radius:      14px;
  --radius-md:   16px;
  --radius-lg:   18px;
  --radius-xl:   24px;
  --radius-pill: 999px;
  --tr:          180ms ease;
}
html[data-theme="light"] {
  --bg:          #eeece7;
  --bg-elev:     #f6f4ef;
  --bg-elev-2:   #ffffff;
  --bg-soft:     #ece9e2;
  --line:        rgba(0,0,0,.08);
  --line-strong: rgba(0,0,0,.13);
  --text:        #17191c;
  --muted:       #5e5a57;
  --muted-2:     #8a8580;
  --cyan:        #009fc7;
  --cyan-soft:   rgba(0,159,199,.10);
  --cyan-soft-2: rgba(0,159,199,.14);
  --cyan-label:  rgba(0,159,199,.58);
  --text-cyan-muted: rgba(0,140,175,.58);
  --green:       #0c9b6d;
  --green-soft:  rgba(12,155,109,.12);
  --amber:       #c78000;
  --amber-soft:  rgba(199,128,0,.12);
  --red:         #d4485e;
  --red-soft:    rgba(212,72,94,.12);
  --blue:        #347de6;
  --purple:      #7c3aed;
  --purple-soft: rgba(124,58,237,.12);
  --warm:        #8b7260;
  --warm-soft:   rgba(139,114,96,.10);
  --glow:        0 0 0 1px rgba(0,159,199,.14) inset;
  --shadow-sm:   0 1px 4px rgba(0,0,0,.06);
  --shadow-md:   0 2px 12px rgba(0,0,0,.08);
  --shadow-lg:   0 4px 18px rgba(0,0,0,.08);
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { overflow-x: clip; }
body {
  font-family: var(--sans);
  color: var(--text);
  line-height: 1.4;
  background:
    radial-gradient(ellipse at 80% 0%,  rgba(0,204,255,.09), transparent 40%),
    radial-gradient(ellipse at 10% 30%, rgba(0,204,255,.05), transparent 32%),
    radial-gradient(ellipse at 55% 90%, rgba(0,204,255,.04), transparent 28%),
    linear-gradient(rgba(255,255,255,.018) 1px, transparent 1px),
    linear-gradient(90deg, rgba(255,255,255,.018) 1px, transparent 1px),
    var(--bg);
  background-size: auto, auto, auto, 52px 52px, 52px 52px, auto;
  min-height: 100vh;
}
[data-theme="light"] body {
  background:
    radial-gradient(ellipse at 80% 0%,  rgba(0,159,199,.08), transparent 40%),
    radial-gradient(ellipse at 10% 30%, rgba(0,159,199,.04), transparent 32%),
    radial-gradient(ellipse at 55% 90%, rgba(0,159,199,.03), transparent 28%),
    linear-gradient(rgba(0,0,0,.032) 1px, transparent 1px),
    linear-gradient(90deg, rgba(0,0,0,.032) 1px, transparent 1px),
    var(--bg);
  background-size: auto, auto, auto, 52px 52px, 52px 52px, auto;
}

/* ── Layout ── */
.nov-page {
  max-width: 1120px;
  margin: 0 auto;
  padding: 0 24px 80px;
}

/* ── Header section ── */
.nov-hero {
  padding: 72px 0 56px;
  text-align: left;
}
.nov-kicker {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 4px 10px; border-radius: var(--radius-pill);
  background: var(--cyan-soft); color: var(--cyan);
  font: 700 10px var(--mono); letter-spacing: .10em;
  text-transform: uppercase; margin-bottom: 20px; border: none;
}
.nov-title {
  font: 800 clamp(32px,5vw,52px)/1.1 var(--display);
  color: var(--text);
  margin-bottom: 10px;
}
.nov-sub {
  font: 400 15px/1.6 var(--sans);
  color: var(--muted);
}

/* ── Filtros ── */
.nov-filters {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  margin-bottom: 36px;
  align-items: center;
}
.nov-filter-label {
  font: 500 12px/1 var(--sans);
  color: var(--muted-2);
  margin-right: 4px;
}
.filter-chip {
  font: 500 12px/1 var(--sans);
  padding: 5px 12px;
  border-radius: var(--radius-pill);
  border: none;
  background: var(--bg-soft);
  color: var(--muted);
  cursor: pointer;
  transition: all var(--tr);
  white-space: nowrap;
}
.filter-chip:hover {
  color: var(--text);
}
.filter-chip.active {
  background: var(--cyan-soft);
  border: none;
  color: var(--cyan);
}
.filter-sep {
  width: 1px;
  height: 20px;
  background: var(--line);
  flex-shrink: 0;
}

/* ── Lista ── */
.nov-list {
  display: flex;
  flex-direction: column;
  gap: 0;
}

/* ── Card ── */
.nov-card {
  display: flex;
  gap: 24px;
  padding: 24px 0;
  border-bottom: 1px solid var(--line);
  transition: opacity var(--tr);
}
.nov-card:first-child { border-top: 1px solid var(--line); }
.nov-card.hidden { display: none; }

/* Columna izquierda: fecha */
.nov-date-col {
  flex-shrink: 0;
  width: 90px;
  padding-top: 2px;
  text-align: right;
}
.nov-date-day {
  font: 700 22px/1 var(--display);
  color: var(--text);
  display: block;
}
.nov-date-month {
  font: 500 11px/1.3 var(--mono);
  letter-spacing: .06em;
  text-transform: uppercase;
  color: var(--muted);
  display: block;
  margin-top: 3px;
}
.nov-date-year {
  font: 400 11px/1 var(--mono);
  color: var(--muted-2);
  display: block;
  margin-top: 2px;
}

/* Divisor vertical */
.nov-divider {
  flex-shrink: 0;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 0;
}
.nov-divider-dot {
  width: 8px;
  height: 8px;
  border-radius: 50%;
  background: var(--line-strong);
  margin-top: 6px;
  flex-shrink: 0;
}
.nov-divider-line {
  flex: 1;
  width: 1px;
  background: var(--line);
  margin-top: 6px;
}
.nov-card:last-child .nov-divider-line { display: none; }

/* Contenido principal */
.nov-body {
  flex: 1;
  min-width: 0;
}
.nov-badges {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
  margin-bottom: 10px;
}
.nov-badge {
  font: 600 10px/1 var(--mono);
  letter-spacing: .08em;
  text-transform: uppercase;
  padding: 3px 8px;
  border-radius: var(--radius-xs);
}
.badge-mejora     { background: var(--cyan-soft);   color: var(--cyan);   }
.badge-nueva      { background: var(--green-soft);  color: var(--green);  }
.badge-performance{ background: var(--purple-soft); color: var(--purple); }
.badge-modulo {
  background: var(--bg-soft);
  color: var(--muted);
  border: 1px solid var(--line);
}
.nov-card-title {
  font: 600 16px/1.3 var(--sans);
  color: var(--text);
  margin-bottom: 8px;
}
.nov-card-desc {
  font: 400 14px/1.65 var(--sans);
  color: var(--muted);
  white-space: pre-line;
  margin-bottom: 12px;
}
.nov-link {
  display: inline-flex;
  align-items: center;
  gap: 5px;
  font: 500 12px/1 var(--sans);
  color: var(--cyan);
  text-decoration: none;
  transition: opacity var(--tr);
}
.nov-link:hover { opacity: .75; }
.nov-link svg { flex-shrink: 0; }

/* ── Estado vacío / error / loading ── */
.nov-state {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 64px 24px;
  text-align: center;
  gap: 12px;
}
.nov-state-icon {
  width: 40px;
  height: 40px;
  border-radius: 50%;
  background: var(--bg-soft);
  display: flex;
  align-items: center;
  justify-content: center;
}
.nov-state-title {
  font: 600 15px/1.3 var(--sans);
  color: var(--text);
}
.nov-state-sub {
  font: 400 13px/1.5 var(--sans);
  color: var(--muted);
  max-width: 340px;
}

/* ── Count ── */
.nov-count {
  font: 400 13px/1 var(--sans);
  color: var(--muted-2);
  margin-bottom: 20px;
}
.nov-count strong { color: var(--muted); }

/* ── Skeleton loading ── */
.skeleton {
  border-radius: var(--radius-sm);
  background: linear-gradient(90deg, var(--bg-soft) 25%, var(--line) 50%, var(--bg-soft) 75%);
  background-size: 200% 100%;
  animation: shimmer 1.4s infinite;
}
@keyframes shimmer {
  0%   { background-position: 200% 0; }
  100% { background-position: -200% 0; }
}
.skel-card {
  display: flex;
  gap: 24px;
  padding: 24px 0;
  border-bottom: 1px solid var(--line);
}
.skel-card:first-child { border-top: 1px solid var(--line); }
.skel-date { width: 90px; flex-shrink: 0; }
.skel-date-d { height: 28px; width: 40px; margin-left: auto; margin-bottom: 6px; }
.skel-date-m { height: 10px; width: 50px; margin-left: auto; }
.skel-body { flex: 1; }
.skel-badge-row { display: flex; gap: 6px; margin-bottom: 10px; }
.skel-badge { height: 16px; width: 60px; }
.skel-title { height: 18px; width: 65%; margin-bottom: 10px; }
.skel-line { height: 12px; width: 100%; margin-bottom: 6px; }
.skel-line.short { width: 75%; }

@media (max-width: 600px) {
  .nov-date-col { width: 60px; }
  .nov-date-day { font-size: 18px; }
  .nov-title { font-size: 24px; }
  .nov-card { gap: 14px; }
  .nov-divider { display: none; }
}
</style>
</head>
<body>
<site-header base="./" current-page="novedades"></site-header>

<main class="nov-page" id="nov-page">

  <!-- Hero -->
  <div class="nov-hero">
    <span class="nov-kicker">Changelog</span>
    <h1 class="nov-title">Novedades de producto</h1>
    <p class="nov-sub">Mejoras, nuevas funciones y optimizaciones de rendimiento que lanzamos en YiQi ERP.</p>
  </div>

  <!-- Filtros -->
  <div class="nov-filters" id="nov-filters" aria-label="Filtros">
    <span class="nov-filter-label">Tipo:</span>
    <button class="filter-chip active" data-group="tipo" data-value="">Todos</button>
    <button class="filter-chip" data-group="tipo" data-value="Mejora">Mejora</button>
    <button class="filter-chip" data-group="tipo" data-value="Nueva funcionalidad">Nueva función</button>
    <button class="filter-chip" data-group="tipo" data-value="Performance">Performance</button>
    <div class="filter-sep"></div>
    <span class="nov-filter-label">Módulo:</span>
    <button class="filter-chip active" data-group="modulo" data-value="">Todos</button>
  </div>

  <!-- Contador -->
  <p class="nov-count" id="nov-count" style="display:none"></p>

  <!-- Lista de novedades -->
  <div class="nov-list" id="nov-list" role="list">
    <!-- Skeletons mientras carga -->
    <div class="skel-card">
      <div class="skel-date">
        <div class="skeleton skel-date-d"></div>
        <div class="skeleton skel-date-m"></div>
      </div>
      <div class="skel-body">
        <div class="skel-badge-row">
          <div class="skeleton skel-badge"></div>
          <div class="skeleton skel-badge"></div>
        </div>
        <div class="skeleton skel-title"></div>
        <div class="skeleton skel-line"></div>
        <div class="skeleton skel-line short"></div>
      </div>
    </div>
    <div class="skel-card">
      <div class="skel-date">
        <div class="skeleton skel-date-d"></div>
        <div class="skeleton skel-date-m"></div>
      </div>
      <div class="skel-body">
        <div class="skel-badge-row">
          <div class="skeleton skel-badge"></div>
          <div class="skeleton skel-badge"></div>
        </div>
        <div class="skeleton skel-title" style="width:55%"></div>
        <div class="skeleton skel-line"></div>
        <div class="skeleton skel-line short" style="width:50%"></div>
      </div>
    </div>
    <div class="skel-card">
      <div class="skel-date">
        <div class="skeleton skel-date-d"></div>
        <div class="skeleton skel-date-m"></div>
      </div>
      <div class="skel-body">
        <div class="skel-badge-row">
          <div class="skeleton skel-badge"></div>
        </div>
        <div class="skeleton skel-title" style="width:80%"></div>
        <div class="skeleton skel-line"></div>
        <div class="skeleton skel-line short" style="width:60%"></div>
      </div>
    </div>
  </div>
</main>

<site-footer base="./"></site-footer>
<script src="./components/site-footer.js" defer></script>

<script>
const API = 'https://novedades.yiqi.com.ar/api/YiQi/Novedades';

const MESES = ['Ene','Feb','Mar','Abr','May','Jun','Jul','Ago','Sep','Oct','Nov','Dic'];
const TIPO_CLASS = {
  'Mejora':             'badge-mejora',
  'Nueva funcionalidad':'badge-nueva',
  'Performance':        'badge-performance',
};
const TIPO_LABEL = {
  'Mejora':             'Mejora',
  'Nueva funcionalidad':'Nueva función',
  'Performance':        'Performance',
};

let allItems = [];
let activeFilters = { tipo: '', modulo: '' };

function formatDate(iso) {
  const d = new Date(iso);
  return {
    day:   d.getUTCDate().toString().padStart(2,'0'),
    month: MESES[d.getUTCMonth()],
    year:  d.getUTCFullYear(),
  };
}

function badgeHtml(tipo, modulo) {
  const tc = TIPO_CLASS[tipo] || 'badge-mejora';
  const tl = TIPO_LABEL[tipo] || tipo;
  return `
    <span class="nov-badge ${tc}">${tl}</span>
    <span class="nov-badge badge-modulo">${modulo}</span>
  `.trim();
}

function cardHtml(item, isLast) {
  const {day, month, year} = formatDate(item.DateUpdate);
  const desc = (item.Descripcion || '').replace(/\r\n/g, '\n').trim();
  const linkHtml = item.LINK
    ? `<a class="nov-link" href="${item.LINK}" target="_blank" rel="noopener">
        <svg width="12" height="12" viewBox="0 0 12 12" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M1 11L11 1M11 1H4M11 1V8" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
        Ver documentación
       </a>`
    : '';
  return `
<div class="nov-card" data-tipo="${item.TIPO}" data-modulo="${item.Modulo}" role="listitem">
  <div class="nov-date-col">
    <span class="nov-date-day">${day}</span>
    <span class="nov-date-month">${month}</span>
    <span class="nov-date-year">${year}</span>
  </div>
  <div class="nov-divider">
    <div class="nov-divider-dot"></div>
    <div class="nov-divider-line"></div>
  </div>
  <div class="nov-body">
    <div class="nov-badges">${badgeHtml(item.TIPO, item.Modulo)}</div>
    <h2 class="nov-card-title">${item.Title}</h2>
    <p class="nov-card-desc">${desc}</p>
    ${linkHtml}
  </div>
</div>`.trim();
}

function populateModuleFilters(items) {
  const modulos = [...new Set(items.map(i => i.Modulo))].sort();
  const container = document.getElementById('nov-filters');
  modulos.forEach(mod => {
    const btn = document.createElement('button');
    btn.className = 'filter-chip';
    btn.dataset.group = 'modulo';
    btn.dataset.value = mod;
    btn.textContent = mod;
    container.appendChild(btn);
  });
}

function applyFilters() {
  const cards = document.querySelectorAll('.nov-card');
  let visible = 0;
  cards.forEach(card => {
    const matchTipo   = !activeFilters.tipo   || card.dataset.tipo   === activeFilters.tipo;
    const matchModulo = !activeFilters.modulo || card.dataset.modulo === activeFilters.modulo;
    if (matchTipo && matchModulo) {
      card.classList.remove('hidden');
      visible++;
    } else {
      card.classList.add('hidden');
    }
  });
  const countEl = document.getElementById('nov-count');
  countEl.style.display = '';
  countEl.innerHTML = `Mostrando <strong>${visible}</strong> de <strong>${allItems.length}</strong> novedades`;

  // Empty state
  let emptyEl = document.getElementById('nov-empty');
  if (visible === 0) {
    if (!emptyEl) {
      emptyEl = document.createElement('div');
      emptyEl.id = 'nov-empty';
      emptyEl.className = 'nov-state';
      emptyEl.innerHTML = `
        <div class="nov-state-icon">
          <svg width="18" height="18" viewBox="0 0 18 18" fill="none">
            <circle cx="9" cy="9" r="7.5" stroke="currentColor" stroke-width="1.5" opacity=".4"/>
            <path d="M6 9h6M9 6v6" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
          </svg>
        </div>
        <p class="nov-state-title">Sin resultados</p>
        <p class="nov-state-sub">No hay novedades que coincidan con los filtros seleccionados.</p>
      `;
      document.getElementById('nov-list').after(emptyEl);
    }
    emptyEl.style.display = 'flex';
  } else if (emptyEl) {
    emptyEl.style.display = 'none';
  }
}

function bindFilters() {
  document.getElementById('nov-filters').addEventListener('click', e => {
    const chip = e.target.closest('.filter-chip');
    if (!chip) return;
    const group = chip.dataset.group;
    const value = chip.dataset.value;
    // Toggle active dentro del grupo
    document.querySelectorAll(`.filter-chip[data-group="${group}"]`).forEach(c => c.classList.remove('active'));
    chip.classList.add('active');
    activeFilters[group] = value;
    applyFilters();
  });
}

function showError(msg) {
  document.getElementById('nov-list').innerHTML = `
    <div class="nov-state">
      <div class="nov-state-icon" style="color:var(--red)">
        <svg width="18" height="18" viewBox="0 0 18 18" fill="none">
          <circle cx="9" cy="9" r="7.5" stroke="currentColor" stroke-width="1.5" opacity=".5"/>
          <path d="M9 5.5v4M9 12.5v.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
        </svg>
      </div>
      <p class="nov-state-title">No se pudo cargar el changelog</p>
      <p class="nov-state-sub">${msg}</p>
    </div>
  `;
}

async function loadNovedades() {
  try {
    const res = await fetch(API);
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const data = await res.json();
    allItems = data;

    populateModuleFilters(allItems);
    bindFilters();

    const list = document.getElementById('nov-list');
    list.innerHTML = allItems.map((item, i) => cardHtml(item, i === allItems.length - 1)).join('\n');

    applyFilters();
  } catch (err) {
    let hint = err.message.includes('Failed to fetch') || err.message.includes('NetworkError')
      ? 'Puede ser un bloqueo CORS o de red. Asegurate de acceder desde un dominio autorizado.'
      : err.message;
    showError(hint);
    console.error('[novedades]', err);
  }
}

loadNovedades();
</script>
</body>
</html>
