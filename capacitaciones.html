<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>YiQi — Capacitaciones</title>

<style>
[data-theme="light"] {
  --bg:          #f5f4f0;
  --bg-elev:     #eeece7;
  --bg-elev-2:   #e6e4df;
  --bg-soft:     rgba(0,0,0,.04);
  --line:        rgba(0,0,0,.08);
  --line-strong: rgba(0,0,0,.13);
  --text:        #17191c;
  --muted:       #586170;
  --muted-2:     #7f8896;
  --cyan:        #009fc7;
  --cyan-soft:   rgba(0,159,199,.12);
  --cyan-soft-2: rgba(0,159,199,.18);
  --green:       #0c9b6d;
  --amber:       #c78000;
  --red:         #d4485e;
  --blue:        #347de6;
  --purple:      #7c3aed;
  --glow:        0 0 0 3px rgba(0,159,199,.22);
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { overflow-x: clip; }
body {
  font-family: var(--sans);
  color: var(--text);
  background:
    radial-gradient(ellipse at 75% 0%,  rgba(0,204,255,.08), transparent 38%),
    radial-gradient(ellipse at 15% 50%, rgba(0,204,255,.04), transparent 30%),
    linear-gradient(rgba(255,255,255,.018) 1px, transparent 1px),
    linear-gradient(90deg, rgba(255,255,255,.018) 1px, transparent 1px),
    var(--bg);
  background-size: auto, auto, 52px 52px, 52px 52px, auto;
}
[data-theme="light"] body {
  background:
    radial-gradient(ellipse at 75% 0%,  rgba(0,159,199,.07), transparent 38%),
    radial-gradient(ellipse at 15% 50%, rgba(0,159,199,.03), transparent 30%),
    linear-gradient(rgba(0,0,0,.032) 1px, transparent 1px),
    linear-gradient(90deg, rgba(0,0,0,.032) 1px, transparent 1px),
    var(--bg);
  background-size: auto, auto, 52px 52px, 52px 52px, auto;
}

/* ── Hero ── */
.hero {
  max-width: 1120px; margin: 0 auto;
  padding: 72px 24px 56px;
  text-align: left;
}
.hero-kicker {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 4px 10px; border-radius: var(--radius-pill);
  background: var(--cyan-soft); color: var(--cyan);
  font: 700 10px var(--mono); letter-spacing: .10em;
  text-transform: uppercase; margin-bottom: 20px; border: none;
}
.hero-title {
  font: 800 clamp(32px,5vw,52px)/1.1 var(--display);
  letter-spacing: -.02em; margin-bottom: 16px;
}
.hero-sub {
  font: 400 16px/1.6 var(--sans);
  color: var(--muted); max-width: 560px; margin-bottom: 32px;
}
.hero-actions { display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }
.btn {
  display: inline-flex; align-items: center; gap: 8px;
  padding: 10px 20px; border-radius: var(--radius);
  border: 1px solid transparent; background: var(--bg-elev-2);
  color: var(--text); font: 600 13px var(--sans);
  text-decoration: none; transition: all var(--tr);
}
.btn-primary {
  background: var(--cyan-soft);
  border-color: rgba(0,204,255,.28);
  color: var(--cyan);
}
.btn-primary:hover { background: var(--cyan-soft-2); }
.btn-ghost {
  background: transparent;
  border-color: transparent;
  color: var(--muted);
}
.btn-ghost:hover { background: var(--bg-soft); color: var(--text); }

/* ── Sección videos ── */
.yt-section {
  max-width: 1080px; margin: 0 auto;
  padding: 0 24px 80px;
}
.section-kicker {
  display: block;
  font: 700 10px var(--mono); letter-spacing: .14em;
  text-transform: uppercase; color: var(--cyan); margin-bottom: 8px;
}
.section-title {
  font: 700 clamp(22px,3vw,32px)/1.2 var(--display);
  margin-bottom: 6px;
}
.yt-header { margin-bottom: 36px; }
.yt-header-sub {
  font: 400 13px var(--sans); color: var(--muted-2);
  display: flex; align-items: center; gap: 8px;
}
.yt-channel-link {
  display: inline-flex; align-items: center; gap: 5px;
  font: 500 12px var(--mono); color: var(--cyan);
  text-decoration: none; transition: opacity .15s;
}
.yt-channel-link:hover { opacity: .75; }
.yt-featured-label {
  display: inline-flex; align-items: center; gap: 6px;
  font: 600 10px 'Poppins', sans-serif;
  letter-spacing: .12em; text-transform: uppercase;
  color: var(--muted-2); margin-bottom: 12px;
}
.yt-live-dot {
  width: 6px; height: 6px; border-radius: 50%;
  background: #ff0000; animation: ytPulse 2s ease-in-out infinite; flex-shrink: 0;
}
@keyframes ytPulse {
  0%, 100% { opacity: 1; transform: scale(1); }
  50%       { opacity: .5; transform: scale(.8); }
}
.yt-videos-row {
  display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 16px;
}
.yt-featured {
  position: relative; width: 100%; aspect-ratio: 16/9;
  border-radius: var(--radius-lg); overflow: hidden;
  background: #000; border: 1px solid var(--line);
  transition: border-color .2s;
}
.yt-featured:hover { border-color: var(--cyan); }
.yt-featured iframe { position: absolute; inset: 0; width: 100%; height: 100%; border: none; }
.yt-shorts-label {
  font: 600 10px 'Poppins', sans-serif;
  letter-spacing: .12em; text-transform: uppercase;
  color: var(--muted-2); margin: 28px 0 12px;
  display: flex; align-items: center; gap: 8px;
}
.yt-shorts-label::after { content: ''; flex: 1; height: 1px; background: var(--line); }
.yt-shorts-row { display: flex; flex-wrap: wrap; gap: 10px; }
.yt-short {
  flex: 0 0 auto; width: 180px;
  position: relative; aspect-ratio: 9/16;
  border-radius: 12px; overflow: hidden;
  background: #000; border: 1px solid var(--line);
  transition: border-color .2s, transform .2s;
}
.yt-short:hover { border-color: var(--cyan); transform: translateY(-2px); }
.yt-short iframe { position: absolute; inset: 0; width: 100%; height: 100%; border: none; }

/* ── Divider ── */
.section-divider {
  height: 1px; background: var(--line);
  max-width: 1080px; margin: 0 auto 64px; padding: 0 24px;
}
.section-divider-inner { height: 1px; background: var(--line); }

@media (max-width: 640px) {
  .hero { padding: 48px 16px 40px; }
  .yt-section { padding: 0 16px 60px; }
  .yt-videos-row { grid-template-columns: 1fr; }
  .yt-shorts-row { gap: 8px; }
  .yt-short { width: 140px; }
}
</style>
  <script src="./components/clarity.js"></script>
