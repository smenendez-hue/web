# Docs for the Azure Web Apps Deploy action: https://github.com/Azure/webapps-deploy
# More GitHub Actions for Azure: https://github.com/Azure/actions

name: Build and deploy Node.js app to Azure Web App - web-yiqi-nueva

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read #This is required for actions/checkout

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js version
        uses: actions/setup-node@v3
        with:
          node-version: '24.x'

      - name: Enable corepack and install pnpm
        run: corepack enable && corepack prepare pnpm@latest --activate

      - name: npm install, build, and test
        run: |
          pnpm install --frozen-lockfile
          pnpm run --if-present build
          pnpm run --if-present test

      - name: Prepare standalone bundle
        run: |
          rm -rf deploy
          mkdir -p deploy
          cp -R .next/standalone/* deploy/
          mkdir -p deploy/.next
          cp -R .next/static deploy/.next/
          if [ -d public ]; then
            cp -R public deploy/
          fi
          cat > deploy/package.json <<'EOF'
          {
            "name": "my-v0-project",
            "private": true,
            "scripts": {
              "start": "node server.js"
            }
          }
          EOF

      - name: Upload artifact for deployment job
        uses: actions/upload-artifact@v4
        with:
          name: node-app
          path: deploy

  deploy:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      id-token: write #This is required for requesting the JWT
      contents: read #This is required for actions/checkout

    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: node-app
          path: deploy
      
      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_B512E2E3F5404A72902EB079F383993C }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_78CC486FB8804BCC83F2DAF4D7FDFD07 }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_C59970B6BF9145D6A587F1F3CFD3DED2 }}

      - name: 'Deploy to Azure Web App'
        id: deploy-to-webapp
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'web-yiqi-nueva'
          slot-name: 'Production'
          package: deploy
          
