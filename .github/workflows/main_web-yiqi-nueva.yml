# Docs for the Azure Web Apps Deploy action: https://github.com/Azure/webapps-deploy
# More GitHub Actions for Azure: https://github.com/Azure/actions

name: Build and deploy Node.js app to Azure Web App - web-yiqi-nueva

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read #This is required for actions/checkout

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js version
        uses: actions/setup-node@v3
        with:
          node-version: '20.x'

      - name: npm install, build, and test
        run: |
          npm install
          npm run build --if-present
          npm run test --if-present

      - name: Create deployment package
        run: |
          zip -r deploy.zip . \
            -x '.git/*' '.github/*' '.gitignore' 'node_modules/*' '*.log'

      - name: Upload artifact for deployment job
        uses: actions/upload-artifact@v4
        with:
          name: node-app
          path: deploy.zip

  deploy:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      id-token: write #This is required for requesting the JWT
      contents: read #This is required for actions/checkout

    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: node-app
      
      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_80C5F14BD3BF4C24916AE566241ABF04 }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_A139CE458E83458C9ABEE0A3DC93F2BB }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_47D4E21C124F4CCA80256C778590BE87 }}

      - name: Resolve resource group
        id: app
        run: |
          RG=$(az webapp list --query "[?name=='web-yiqi-nueva'].resourceGroup | [0]" -o tsv)
          if [ -z "$RG" ]; then
            echo "Could not resolve resource group for web-yiqi-nueva"
            exit 1
          fi
          echo "resource_group=$RG" >> "$GITHUB_OUTPUT"

      - name: Configure app settings and reset startup command
        run: |
          az webapp config appsettings set \
            --resource-group "${{ steps.app.outputs.resource_group }}" \
            --name "web-yiqi-nueva" \
            --settings SCM_DO_BUILD_DURING_DEPLOYMENT=false ENABLE_ORYX_BUILD=false PORT=8080
          az webapp config set \
            --resource-group "${{ steps.app.outputs.resource_group }}" \
            --name "web-yiqi-nueva" \
            --startup-file ""

      - name: Clean deploy to Azure Web App (con reintentos)
        run: |
          n=0
          until [ $n -ge 3 ]; do
            if az webapp deploy \
                --resource-group "${{ steps.app.outputs.resource_group }}" \
                --name "web-yiqi-nueva" \
                --src-path deploy.zip \
                --type zip \
                --clean true \
                --restart true; then
              echo "Deploy OK"
              exit 0
            fi
            n=$((n+1))
            echo "Deploy fallo (intento $n de 3). Reintentando en 30s..."
            sleep 30
          done
          echo "Deploy fallo tras 3 intentos"
          exit 1
